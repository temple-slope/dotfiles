name: YAML Lint

on:
  pull_request:

jobs:
  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: |
          git ls-files '*.yml' '*.yaml' | xargs -r yamllint -d relaxed
